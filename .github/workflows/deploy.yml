name: Deploy Flutter Web to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Get Packages
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "build/web/*"
          target: "/tmp/lactosure"

      - name: Deploy Website
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/lactosure_web/*
            sudo cp -r /tmp/lactosure/build/web/* /var/www/lactosure_web/
            sudo chown -R www-data:www-data /var/www/lactosure_web
            sudo systemctl reload nginx
            echo "Deployment Completed"